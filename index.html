
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>DB Middleware — NLP to SQL Chat</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #f0f4ff;
    --bg-mesh: radial-gradient(ellipse at 20% 0%, #dde8ff 0%, transparent 55%),
               radial-gradient(ellipse at 80% 10%, #f3dcff 0%, transparent 50%),
               radial-gradient(ellipse at 50% 100%, #d9f0ff 0%, transparent 60%);
    --surface: #ffffff;
    --surface2: #f5f7ff;
    --surface3: #eef1fc;
    --border: rgba(100, 120, 210, 0.12);
    --border2: rgba(100, 120, 210, 0.22);
    --text: #1e2045;
    --text2: #5a5f8a;
    --text3: #9fa4c4;
    --accent: #6366f1;
    --accent2: #8b5cf6;
    --accent-light: #eef0fe;
    --accent-text: #4338ca;
    --accent-grad: linear-gradient(135deg, #6366f1, #8b5cf6);
    --success: #059669;
    --success-light: #d1fae5;
    --danger: #dc2626;
    --danger-light: #fee2e2;
    --amber: #d97706;
    --amber-light: #fef3c7;
    --pink: #db2777;
    --pink-light: #fce7f3;
    --mono: 'DM Mono', 'Courier New', monospace;
    --radius: 16px;
    --radius-sm: 10px;
    --radius-xs: 6px;
    --shadow: 0 4px 24px rgba(99,102,241,0.08);
    --shadow-sm: 0 2px 10px rgba(99,102,241,0.06);
    --shadow-input: 0 0 0 3px rgba(99,102,241,0.15);
  }

  body {
    font-family: 'DM Sans', -apple-system, sans-serif;
    background: var(--bg);
    background-image: var(--bg-mesh);
    background-attachment: fixed;
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── HEADER ── */
  header {
    background: rgba(255,255,255,0.75);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border-bottom: 1px solid var(--border);
    padding: 14px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
    box-shadow: var(--shadow-sm);
    z-index: 10;
  }
  .header-left { display: flex; align-items: center; gap: 12px; }
  .logo {
    width: 36px; height: 36px;
    border-radius: var(--radius-sm);
    background: var(--accent-grad);
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
    box-shadow: 0 4px 12px rgba(99,102,241,0.35);
  }
  .header-title { font-size: 15px; font-weight: 600; color: var(--text); letter-spacing: -0.3px; }
  .header-sub { font-size: 11px; color: var(--text3); font-weight: 400; margin-top: 1px; }

  .status-pill {
    display: flex; align-items: center; gap: 6px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 99px;
    padding: 5px 12px;
    font-size: 12px;
    font-weight: 500;
    color: var(--text2);
  }
  .status-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--text3);
    transition: background 0.4s;
  }
  .status-dot.online { background: #10b981; box-shadow: 0 0 0 3px rgba(16,185,129,0.2); }
  .status-dot.offline { background: #f87171; box-shadow: 0 0 0 3px rgba(248,113,113,0.2); }

  /* ── SCHEMA BAR ── */
  .schema-bar {
    background: rgba(254,243,199,0.8);
    backdrop-filter: blur(8px);
    border-bottom: 1px solid rgba(217,119,6,0.18);
    padding: 9px 24px;
    display: flex; align-items: center; gap: 10px;
    font-size: 13px; color: var(--amber);
    font-weight: 500;
    flex-shrink: 0; flex-wrap: wrap;
    transition: all 0.3s;
  }
  .schema-bar.connected {
    background: rgba(209,250,229,0.8);
    border-bottom-color: rgba(5,150,105,0.18);
    color: var(--success);
  }
  .schema-bar button {
    margin-left: auto;
    background: rgba(255,255,255,0.7);
    border: 1px solid currentColor;
    color: inherit;
    border-radius: 99px;
    padding: 4px 14px;
    font-size: 12px;
    font-family: inherit;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s;
  }
  .schema-bar button:hover { background: rgba(255,255,255,0.95); }
  #schema-tables { font-size: 12px; color: var(--text2); display: flex; gap: 6px; flex-wrap: wrap; }
  .table-pill {
    background: rgba(255,255,255,0.8);
    border: 1px solid var(--border2);
    border-radius: 99px;
    padding: 2px 10px;
    font-size: 11px;
    font-weight: 500;
    color: var(--text2);
  }

  /* ── MESSAGES ── */
  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 28px 24px;
    display: flex; flex-direction: column; gap: 20px;
    scroll-behavior: smooth;
  }
  #messages::-webkit-scrollbar { width: 4px; }
  #messages::-webkit-scrollbar-track { background: transparent; }
  #messages::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 99px; }

  .msg { display: flex; gap: 12px; max-width: 100%; animation: msgIn 0.3s cubic-bezier(.2,.8,.4,1) both; }
  @keyframes msgIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: none; } }
  .msg.user { flex-direction: row-reverse; }

  .avatar {
    width: 32px; height: 32px;
    border-radius: 50%;
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 600;
  }
  .avatar.bot {
    background: var(--accent-grad);
    color: #fff;
    box-shadow: 0 3px 10px rgba(99,102,241,0.3);
  }
  .avatar.user {
    background: linear-gradient(135deg, #f0abfc, #a78bfa);
    color: #fff;
    box-shadow: 0 3px 10px rgba(167,139,250,0.3);
  }

  .bubble {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    border-top-left-radius: 4px;
    padding: 14px 18px;
    font-size: 14px;
    line-height: 1.65;
    max-width: 80%;
    box-shadow: var(--shadow-sm);
    color: var(--text);
  }
  .msg.user .bubble {
    background: linear-gradient(135deg, #6366f1, #8b5cf6);
    border-color: transparent;
    color: #fff;
    border-radius: var(--radius);
    border-top-right-radius: 4px;
    box-shadow: 0 4px 20px rgba(99,102,241,0.3);
  }
  .bubble p { margin-bottom: 6px; }
  .bubble p:last-child { margin-bottom: 0; }

  /* ── SQL BLOCK ── */
  .sql-label {
    font-size: 10px;
    font-family: 'DM Mono', monospace;
    font-weight: 500;
    color: var(--accent);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 6px;
    display: flex; align-items: center; gap: 6px;
  }
  .sql-label::before {
    content: '';
    display: inline-block;
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--accent-grad);
  }
  .sql-block {
    background: #1e2045;
    border: 1px solid rgba(99,102,241,0.2);
    border-radius: var(--radius-sm);
    padding: 14px 16px;
    margin: 10px 0;
    font-family: var(--mono);
    font-size: 12.5px;
    white-space: pre-wrap;
    word-break: break-all;
    color: #a5b4fc;
    line-height: 1.7;
    position: relative;
    overflow: hidden;
  }
  .sql-block::before {
    content: '';
    position: absolute;
    top: 0; left: 0;
    width: 3px; height: 100%;
    background: var(--accent-grad);
    border-radius: 2px 0 0 2px;
  }

  /* ── RESULTS TABLE ── */
  .result-wrap {
    margin-top: 12px;
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    overflow: hidden;
    box-shadow: var(--shadow-sm);
  }
  .result-header {
    background: var(--surface2);
    padding: 8px 14px;
    font-size: 12px;
    font-weight: 500;
    color: var(--text2);
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 8px;
  }
  .row-count {
    margin-left: auto;
    background: var(--success-light);
    color: var(--success);
    border-radius: 99px;
    padding: 2px 10px;
    font-size: 11px;
    font-weight: 600;
  }
  .result-table-wrap { overflow-x: auto; max-height: 240px; overflow-y: auto; }
  .result-table-wrap::-webkit-scrollbar { height: 4px; width: 4px; }
  .result-table-wrap::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 99px; }
  table { width: 100%; border-collapse: collapse; font-size: 12.5px; }
  th {
    background: var(--surface2);
    padding: 8px 14px;
    text-align: left;
    font-weight: 600;
    font-size: 11px;
    color: var(--text2);
    border-bottom: 1px solid var(--border);
    white-space: nowrap;
    position: sticky; top: 0;
    letter-spacing: 0.3px;
    text-transform: uppercase;
  }
  td { padding: 8px 14px; border-bottom: 1px solid var(--border); color: var(--text); white-space: nowrap; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: var(--accent-light); transition: background 0.15s; }

  /* ── BADGES ── */
  .meta { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 12px; }
  .badge {
    border-radius: 99px;
    padding: 3px 10px;
    font-size: 11px;
    font-weight: 500;
    border: 1px solid transparent;
  }
  .badge.slm { background: var(--accent-light); color: var(--accent-text); border-color: rgba(99,102,241,0.2); }
  .badge.rule { background: var(--amber-light); color: var(--amber); border-color: rgba(217,119,6,0.2); }
  .badge.high { background: var(--success-light); color: var(--success); border-color: rgba(5,150,105,0.2); }
  .badge.low { background: var(--amber-light); color: var(--amber); border-color: rgba(217,119,6,0.2); }
  .badge.err { background: var(--danger-light); color: var(--danger); border-color: rgba(220,38,38,0.2); }

  /* ── SCHEMA PROMPT ── */
  .schema-prompt { font-size: 14px; }
  .schema-prompt p { margin-bottom: 12px; color: var(--text2); line-height: 1.6; }
  .choice-row { display: flex; gap: 10px; margin-bottom: 14px; }
  .choice-btn {
    flex: 1;
    padding: 14px 12px;
    border-radius: var(--radius-sm);
    border: 1.5px solid var(--border2);
    background: var(--surface2);
    color: var(--text);
    cursor: pointer;
    font-size: 13px;
    font-family: inherit;
    font-weight: 500;
    text-align: center;
    line-height: 1.6;
    transition: all 0.18s;
  }
  .choice-btn:hover {
    border-color: var(--accent);
    background: var(--accent-light);
    color: var(--accent-text);
    box-shadow: 0 4px 16px rgba(99,102,241,0.12);
    transform: translateY(-1px);
  }
  .schema-textarea {
    width: 100%;
    background: #1e2045;
    border: 1px solid rgba(99,102,241,0.2);
    border-radius: var(--radius-sm);
    padding: 12px 14px;
    font-size: 12.5px;
    font-family: var(--mono);
    color: #a5b4fc;
    resize: vertical;
    min-height: 90px;
    outline: none;
    margin-bottom: 10px;
    transition: border-color 0.2s;
    line-height: 1.6;
  }
  .schema-textarea:focus { border-color: var(--accent); box-shadow: var(--shadow-input); }

  .btn-row { display: flex; gap: 8px; }
  .btn-row button {
    flex: 1;
    border-radius: var(--radius-sm);
    padding: 9px;
    font-size: 13px;
    font-family: inherit;
    font-weight: 500;
    cursor: pointer;
    border: 1.5px solid var(--border2);
    background: var(--surface);
    color: var(--text);
    transition: all 0.15s;
  }
  .btn-row button:hover { background: var(--surface3); }
  .btn-row button.primary {
    background: var(--accent-grad);
    color: #fff;
    border-color: transparent;
    box-shadow: 0 4px 14px rgba(99,102,241,0.3);
  }
  .btn-row button.primary:hover { box-shadow: 0 6px 20px rgba(99,102,241,0.4); transform: translateY(-1px); }

  /* ── INPUT AREA ── */
  .input-area {
    background: rgba(255,255,255,0.8);
    backdrop-filter: blur(16px);
    border-top: 1px solid var(--border);
    padding: 14px 24px 16px;
    flex-shrink: 0;
    box-shadow: 0 -4px 24px rgba(99,102,241,0.05);
  }
  .input-row {
    display: flex; gap: 10px; align-items: flex-end;
    background: var(--surface);
    border: 1.5px solid var(--border2);
    border-radius: var(--radius);
    padding: 10px 12px;
    transition: border-color 0.2s, box-shadow 0.2s;
    box-shadow: var(--shadow-sm);
  }
  .input-row:focus-within {
    border-color: var(--accent);
    box-shadow: var(--shadow-input);
  }
  #user-input {
    flex: 1;
    background: transparent;
    border: none; outline: none;
    font-size: 14px;
    font-family: inherit;
    color: var(--text);
    resize: none;
    max-height: 120px;
    line-height: 1.55;
  }
  #user-input::placeholder { color: var(--text3); }

  .send-btn {
    width: 34px; height: 34px;
    background: var(--accent-grad);
    border: none;
    border-radius: var(--radius-sm);
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: all 0.18s;
    box-shadow: 0 3px 10px rgba(99,102,241,0.3);
  }
  .send-btn:hover { transform: scale(1.08); box-shadow: 0 5px 16px rgba(99,102,241,0.4); }
  .send-btn:disabled { opacity: 0.4; cursor: default; transform: none; box-shadow: none; }
  .send-btn svg { width: 15px; height: 15px; fill: #fff; }

  .input-hints { display: flex; gap: 6px; margin-top: 10px; flex-wrap: wrap; }
  .hint-btn {
    font-size: 12px; font-family: inherit; font-weight: 500;
    color: var(--text3);
    background: rgba(255,255,255,0.7);
    border: 1px solid var(--border);
    border-radius: 99px;
    padding: 4px 12px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .hint-btn:hover {
    border-color: var(--accent);
    color: var(--accent-text);
    background: var(--accent-light);
    transform: translateY(-1px);
  }

  .settings-row {
    display: flex; gap: 16px;
    margin-top: 8px; align-items: center; flex-wrap: wrap;
  }
  .toggle-label {
    display: flex; align-items: center; gap: 6px;
    font-size: 12px; font-weight: 500; color: var(--text3); cursor: pointer;
  }
  .toggle-label input { accent-color: var(--accent); cursor: pointer; }
  .db-badge {
    margin-left: auto;
    font-size: 11px;
    font-weight: 500;
    color: var(--text3);
    background: var(--surface3);
    border: 1px solid var(--border);
    border-radius: 99px;
    padding: 3px 10px;
  }

  /* ── TYPING ── */
  .typing { display: flex; align-items: center; gap: 5px; padding: 4px 2px; }
  .typing span {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--accent);
    opacity: 0.5;
    display: inline-block;
    animation: bounce 1.3s infinite;
  }
  .typing span:nth-child(2) { animation-delay: 0.18s; }
  .typing span:nth-child(3) { animation-delay: 0.36s; }
  @keyframes bounce { 0%,80%,100%{transform:translateY(0); opacity:0.5} 40%{transform:translateY(-6px); opacity:1} }

  /* ── EMPTY STATE ── */
  .empty-state {
    text-align: center;
    margin: auto;
    display: flex; flex-direction: column; align-items: center; gap: 14px;
    animation: fadeUp 0.5s ease both;
  }
  @keyframes fadeUp { from { opacity:0; transform:translateY(16px); } to { opacity:1; transform:none; } }
  .empty-icon-wrap {
    width: 72px; height: 72px;
    border-radius: 24px;
    background: var(--accent-grad);
    display: flex; align-items: center; justify-content: center;
    font-size: 32px;
    box-shadow: 0 8px 32px rgba(99,102,241,0.25);
  }
  .empty-title { font-size: 18px; font-weight: 600; color: var(--text); letter-spacing: -0.4px; }
  .empty-sub { font-size: 14px; color: var(--text3); max-width: 320px; line-height: 1.65; }
  .empty-chips { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; margin-top: 4px; }
  .empty-chip {
    font-size: 12px; font-family: inherit; font-weight: 500;
    color: var(--accent-text);
    background: var(--accent-light);
    border: 1px solid rgba(99,102,241,0.2);
    border-radius: 99px;
    padding: 5px 14px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .empty-chip:hover { background: #e0e2fd; transform: translateY(-1px); }
</style>
</head>
<body>

<header>
  <div class="header-left">
    <div class="logo">📊</div>
    <div>
      <div class="header-title">DB Middleware Chat</div>
      <div class="header-sub">Natural Language → SQL</div>
    </div>
  </div>
  <div class="status-pill">
    <span class="status-dot" id="status-dot"></span>
    <span id="status-text">Connecting…</span>
  </div>
</header>

<div class="schema-bar" id="schema-bar">
  <span id="schema-bar-icon">⚠</span>
  <span id="schema-bar-msg">No database connected.</span>
  <div id="schema-tables"></div>
  <button onclick="showSchemaChooser()">Change DB</button>
</div>

<div id="messages">
  <div class="empty-state" id="empty-state">
    <div class="empty-icon-wrap">📊</div>
    <div class="empty-title">Ask anything about your data</div>
    <div class="empty-sub">Type a question in plain English. Connect a database first by entering a DB URL or pasting schema DDL.</div>
    <div class="empty-chips">
      <button class="empty-chip" onclick="useHint('Show all employees')">All employees</button>
      <button class="empty-chip" onclick="useHint('Average salary by department')">Avg salary by dept</button>
      <button class="empty-chip" onclick="useHint('Top 5 highest paid')">Top 5 paid</button>
    </div>
  </div>
</div>

<div class="input-area">
  <div class="input-row">
    <textarea id="user-input" rows="1" placeholder="Ask a question about your data…" onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
    <button class="send-btn" id="send-btn" onclick="sendMessage()">
      <svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2z"/></svg>
    </button>
  </div>
  <div class="input-hints">
    <button class="hint-btn" onclick="useHint('Show all employees')">All employees</button>
    <button class="hint-btn" onclick="useHint('Average salary by department')">Avg salary by dept</button>
    <button class="hint-btn" onclick="useHint('List all active projects')">Active projects</button>
    <button class="hint-btn" onclick="useHint('Top 5 highest paid employees')">Top 5 paid</button>
    <button class="hint-btn" onclick="useHint('Count employees per department')">Count by dept</button>
  </div>
  <div class="settings-row">
    <label class="toggle-label"><input type="checkbox" id="use-model"> Use AI model (SLM)</label>
    <label class="toggle-label"><input type="checkbox" id="execute-query" checked> Execute query</label>
    <span class="db-badge" id="db-label">DB: not connected</span>
  </div>
</div>

<script>
const API = 'http://localhost:8000/api/v1';
let hasSchema = false;
let pendingQuestion = null;

function esc(s) {
  return String(s == null ? 'NULL' : s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

async function checkHealth() {
  try {
    const r = await fetch(API + '/health');
    if (r.ok) { setStatus(true); } else throw new Error();
  } catch {
    setStatus(false);
    updateSchemaBar([], false);
  }
}

function setStatus(online) {
  const dot = document.getElementById('status-dot');
  dot.className = 'status-dot ' + (online ? 'online' : 'offline');
  document.getElementById('status-text').textContent = online ? 'Backend online' : 'Offline — start uvicorn';
}

function updateSchemaBar(tables, connected) {
  const bar = document.getElementById('schema-bar');
  bar.className = 'schema-bar' + (connected ? ' connected' : '');
  document.getElementById('schema-bar-icon').textContent = connected ? '✓' : '⚠';
  document.getElementById('schema-bar-msg').textContent = connected ? 'Connected:' : 'No database connected. Ask a question to set up.';
  document.getElementById('schema-tables').innerHTML = tables.map(t => `<span class="table-pill">${esc(t)}</span>`).join('');
}

function addMsg(html, isUser) {
  document.getElementById('empty-state')?.remove();
  const msgs = document.getElementById('messages');
  const d = document.createElement('div');
  d.className = 'msg' + (isUser ? ' user' : '');
  const label = isUser ? 'U' : 'DB';
  const cls = isUser ? 'user' : 'bot';
  d.innerHTML = `<div class="avatar ${cls}">${label}</div><div class="bubble">${html}</div>`;
  msgs.appendChild(d);
  msgs.scrollTop = msgs.scrollHeight;
  return d;
}

function addBotText(text) { addMsg(`<p>${esc(text)}</p>`, false); }

function showTyping() {
  const d = addMsg('<div class="typing"><span></span><span></span><span></span></div>', false);
  d.id = 'typing';
  return d;
}
function removeTyping() { document.getElementById('typing')?.remove(); }

function showSchemaChooser() {
  document.getElementById('empty-state')?.remove();
  const d = addMsg(`
    <div class="schema-prompt">
      <p>How would you like to connect your database?</p>
      <div class="choice-row">
        <button class="choice-btn" onclick="showDBUrlInput(this)">📊 Connect DB URL<br><small style="color:var(--text3);font-weight:400">sqlite:///./mydata.db or any supported SQLAlchemy URL</small></button>
        <button class="choice-btn" onclick="showDDLInput(this)">📄 Paste schema DDL<br><small style="color:var(--text3);font-weight:400">create an in-memory database</small></button>
      </div>
    </div>`, false);
  d.id = 'schema-chooser';
}

function showDBUrlInput(btn) {
  document.getElementById('schema-chooser')?.remove();
  const d = addMsg(`
    <div class="schema-prompt">
      <p>Enter your database connection URL.</p>
      <input id="db-url" class="schema-textarea" style="min-height:unset;height:42px;resize:none;" placeholder="sqlite:///./mydb.db" />
      <div class="btn-row">
        <button onclick="this.closest('.msg').remove()">Cancel</button>
        <button class="primary" onclick="submitDBUrl()">Connect</button>
      </div>
    </div>`, false);
  d.id = 'db-url-input';
}

function showDDLInput(btn) {
  document.getElementById('schema-chooser')?.remove();
  const d = addMsg(`
    <div class="schema-prompt">
      <p>Paste your CREATE TABLE statements below. This will create an in-memory database for query execution.</p>
      <textarea class="schema-textarea" id="ddl-text" placeholder="CREATE TABLE users (\n  id INTEGER PRIMARY KEY,\n  name TEXT\n);\n\nCREATE TABLE orders (\n  id INTEGER PRIMARY KEY,\n  user_id INTEGER,\n  amount REAL\n);"></textarea>
      <div class="btn-row">
        <button onclick="this.closest('.msg').remove()">Cancel</button>
        <button class="primary" onclick="submitDDL()">Use this schema</button>
      </div>
    </div>`, false);
  d.id = 'ddl-input';
}

async function submitDBUrl() {
  const database_url = document.getElementById('db-url')?.value.trim();
  if (!database_url) return;
  document.getElementById('db-url-input')?.remove();
  await connectDatabase({ database_url });
}

async function submitDDL() {
  const ddl = document.getElementById('ddl-text')?.value.trim();
  if (!ddl) return;
  document.getElementById('ddl-input')?.remove();
  await connectDatabase({ ddl });
}

async function connectDatabase(body) {
  addBotText('Connecting to database...');
  try {
    const res = await fetch(API + '/connect', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    });
    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      throw new Error(err.detail || 'Unable to connect to database.');
    }
    const data = await res.json();
    hasSchema = true;
    const tables = data.tables || [];
    updateSchemaBar(tables, true);
    document.getElementById('db-label').textContent = body.database_url
      ? `DB: ${body.database_url}`
      : `DB: custom (${tables.length} table${tables.length !== 1 ? 's' : ''})`;
    addBotText(`Connected successfully. Schema contains ${tables.length} table(s): ${tables.join(', ')}.`);
    if (pendingQuestion) {
      const q = pendingQuestion;
      pendingQuestion = null;
      doQuery(q);
    }
  } catch (err) {
    addBotText(err.message);
  }
}

function buildResultBubble(data) {
  const { generated_sql, method, confidence, result, error } = data;
  let h = `<div class="sql-label">Generated SQL</div><div class="sql-block">${esc(generated_sql)}</div>`;
  if (result) {
    const { columns, rows, row_count } = result;
    h += `<div class="result-wrap"><div class="result-header">Results <span class="row-count">${row_count} row${row_count !== 1 ? 's' : ''}</span></div>`;
    if (row_count === 0) {
      h += `<div style="padding:14px;font-size:13px;color:var(--text3);text-align:center">No results found</div>`;
    } else {
      h += `<div class="result-table-wrap"><table><thead><tr>${columns.map(c=>`<th>${esc(c)}</th>`).join('')}</tr></thead><tbody>`;
      rows.forEach(row => { h += `<tr>${columns.map(c=>`<td>${esc(row[c])}</td>`).join('')}</tr>`; });
      h += `</tbody></table></div>`;
    }
    h += `</div>`;
  }
  if (error && !result) h += `<div class="meta"><span class="badge err">Error: ${esc(error)}</span></div>`;
  h += `<div class="meta">
    <span class="badge ${method === 'slm' ? 'slm' : 'rule'}">${method === 'slm' ? 'AI model' : 'Rule-based'}</span>
    <span class="badge ${confidence}">${confidence} confidence</span>
  </div>`;
  return h;
}

async function doQuery(question) {
  const useModel = document.getElementById('use-model').checked;
  const execute = document.getElementById('execute-query').checked;
  showTyping();
  try {
    const body = { question, execute, use_model: useModel };
    const r = await fetch(API + '/query', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(body) });
    removeTyping();
    if (!r.ok) { const e = await r.json().catch(()=>({})); addBotText(`Error ${r.status}: ${e.detail || 'Something went wrong.'}`); }
    else { addMsg(buildResultBubble(await r.json()), false); }
  } catch {
    removeTyping();
    addBotText('Cannot reach the backend. Make sure uvicorn is running at localhost:8000.');
  }
}

async function sendMessage() {
  const input = document.getElementById('user-input');
  const question = input.value.trim();
  if (!question) return;
  input.value = ''; input.style.height = 'auto';
  document.getElementById('send-btn').disabled = true;
  addMsg(`<p>${esc(question)}</p>`, true);
  if (!hasSchema) {
    pendingQuestion = question;
    addBotText("I need to know your database schema first. Which database would you like to use?");
    showSchemaChooser();
    document.getElementById('send-btn').disabled = false;
    return;
  }
  await doQuery(question);
  document.getElementById('send-btn').disabled = false;
}

function handleKey(e) { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } }
function autoResize(el) { el.style.height = 'auto'; el.style.height = Math.min(el.scrollHeight, 120) + 'px'; }
function useHint(t) { document.getElementById('user-input').value = t; sendMessage(); }

checkHealth();
</script>
</body>
</html>
