<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>DB Middleware — NLP to SQL Chat</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #f5f5f3; --surface: #ffffff; --surface2: #f0efeb;
    --border: rgba(0,0,0,0.1); --border2: rgba(0,0,0,0.18);
    --text: #1a1a18; --text2: #5f5e5a; --text3: #888780;
    --accent: #534AB7; --accent-light: #EEEDFE; --accent-text: #3C3489;
    --success: #3B6D11; --success-light: #EAF3DE;
    --danger: #A32D2D; --danger-light: #FCEBEB;
    --amber: #854F0B; --amber-light: #FAEEDA;
    --mono: 'Courier New', monospace; --radius: 12px; --radius-sm: 8px;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1c1c1a; --surface: #262624; --surface2: #2e2e2b;
      --border: rgba(255,255,255,0.1); --border2: rgba(255,255,255,0.18);
      --text: #f0efeb; --text2: #b4b2a9; --text3: #888780;
      --accent: #AFA9EC; --accent-light: #26215C; --accent-text: #CECBF6;
      --success-light: #173404; --danger-light: #501313; --amber-light: #412402;
    }
  }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
  header { background: var(--surface); border-bottom: 0.5px solid var(--border); padding: 12px 20px; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
  .header-left { display: flex; align-items: center; gap: 10px; }
  .logo { width: 32px; height: 32px; border-radius: var(--radius-sm); background: var(--accent-light); display: flex; align-items: center; justify-content: center; font-size: 16px; }
  .header-title { font-size: 15px; font-weight: 500; }
  .header-sub { font-size: 12px; color: var(--text3); }
  .status-dot { width: 8px; height: 8px; border-radius: 50%; background: #888780; display: inline-block; margin-right: 5px; }
  .status-text { font-size: 12px; color: var(--text2); }
  .schema-bar { background: var(--amber-light); border-bottom: 0.5px solid var(--border); padding: 8px 20px; display: flex; align-items: center; gap: 10px; font-size: 13px; color: var(--amber); flex-shrink: 0; flex-wrap: wrap; }
  .schema-bar.connected { background: var(--success-light); color: var(--success); }
  .schema-bar button { margin-left: auto; background: transparent; border: 0.5px solid currentColor; color: inherit; border-radius: var(--radius-sm); padding: 3px 10px; font-size: 12px; cursor: pointer; }
  #schema-tables { font-size: 12px; color: var(--text2); display: flex; gap: 6px; flex-wrap: wrap; }
  .table-pill { background: var(--surface); border: 0.5px solid var(--border2); border-radius: 99px; padding: 2px 8px; font-size: 11px; color: var(--text2); }
  #messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 16px; }
  .msg { display: flex; gap: 10px; max-width: 100%; }
  .msg.user { flex-direction: row-reverse; }
  .avatar { width: 30px; height: 30px; border-radius: 50%; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 500; }
  .avatar.bot { background: var(--accent-light); color: var(--accent-text); }
  .avatar.user { background: var(--surface2); color: var(--text2); }
  .bubble { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 12px 14px; font-size: 14px; line-height: 1.6; max-width: 82%; }
  .msg.user .bubble { background: var(--accent-light); border-color: transparent; color: var(--accent-text); }
  .bubble p { margin-bottom: 6px; }
  .bubble p:last-child { margin-bottom: 0; }
  .sql-block { background: var(--surface2); border: 0.5px solid var(--border2); border-radius: var(--radius-sm); padding: 10px 12px; margin: 10px 0; font-family: var(--mono); font-size: 12px; white-space: pre-wrap; word-break: break-all; color: var(--accent-text); }
  .sql-label { font-size: 10px; font-family: -apple-system, sans-serif; font-weight: 500; color: var(--text3); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; }
  .result-wrap { margin-top: 10px; border: 0.5px solid var(--border); border-radius: var(--radius-sm); overflow: hidden; }
  .result-header { background: var(--surface2); padding: 6px 12px; font-size: 12px; color: var(--text2); border-bottom: 0.5px solid var(--border); display: flex; align-items: center; gap: 6px; }
  .row-count { margin-left: auto; background: var(--success-light); color: var(--success); border-radius: 99px; padding: 1px 8px; font-size: 11px; }
  .result-table-wrap { overflow-x: auto; max-height: 240px; overflow-y: auto; }
  table { width: 100%; border-collapse: collapse; font-size: 12px; }
  th { background: var(--surface2); padding: 7px 12px; text-align: left; font-weight: 500; font-size: 11px; color: var(--text2); border-bottom: 0.5px solid var(--border); white-space: nowrap; position: sticky; top: 0; }
  td { padding: 7px 12px; border-bottom: 0.5px solid var(--border); color: var(--text); white-space: nowrap; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: var(--surface2); }
  .meta { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 8px; }
  .badge { border-radius: 99px; padding: 2px 8px; font-size: 11px; border: 0.5px solid var(--border); }
  .badge.slm { background: var(--accent-light); color: var(--accent-text); }
  .badge.rule { background: var(--amber-light); color: var(--amber); }
  .badge.high { background: var(--success-light); color: var(--success); }
  .badge.low { background: var(--amber-light); color: var(--amber); }
  .badge.err { background: var(--danger-light); color: var(--danger); }
  .schema-prompt { font-size: 13px; }
  .schema-prompt p { margin-bottom: 10px; color: var(--text2); }
  .choice-row { display: flex; gap: 8px; margin-bottom: 12px; }
  .choice-btn { flex: 1; padding: 10px 8px; border-radius: var(--radius-sm); border: 0.5px solid var(--border2); background: var(--surface2); color: var(--text); cursor: pointer; font-size: 12px; text-align: center; line-height: 1.5; }
  .choice-btn:hover { border-color: var(--accent); }
  .schema-textarea { width: 100%; background: var(--surface2); border: 0.5px solid var(--border2); border-radius: var(--radius-sm); padding: 8px 10px; font-size: 12px; font-family: var(--mono); color: var(--text); resize: vertical; min-height: 90px; outline: none; margin-bottom: 8px; }
  .schema-textarea:focus { border-color: var(--accent); }
  .btn-row { display: flex; gap: 8px; }
  .btn-row button { flex: 1; border-radius: var(--radius-sm); padding: 7px; font-size: 12px; cursor: pointer; border: 0.5px solid var(--border2); background: var(--surface); color: var(--text); }
  .btn-row button.primary { background: var(--accent); color: #fff; border-color: transparent; }
  .input-area { background: var(--surface); border-top: 0.5px solid var(--border); padding: 12px 20px; flex-shrink: 0; }
  .input-row { display: flex; gap: 8px; align-items: flex-end; background: var(--surface2); border: 0.5px solid var(--border2); border-radius: var(--radius); padding: 8px 10px; }
  .input-row:focus-within { border-color: var(--accent); }
  #user-input { flex: 1; background: transparent; border: none; outline: none; font-size: 14px; color: var(--text); resize: none; max-height: 120px; line-height: 1.5; font-family: inherit; }
  #user-input::placeholder { color: var(--text3); }
  .send-btn { width: 32px; height: 32px; background: var(--accent); border: none; border-radius: var(--radius-sm); cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .send-btn:disabled { opacity: 0.4; cursor: default; }
  .send-btn svg { width: 15px; height: 15px; fill: #fff; }
  .input-hints { display: flex; gap: 8px; margin-top: 8px; flex-wrap: wrap; }
  .hint-btn { font-size: 12px; color: var(--text3); background: transparent; border: 0.5px solid var(--border); border-radius: 99px; padding: 3px 10px; cursor: pointer; }
  .hint-btn:hover { border-color: var(--accent); color: var(--accent-text); }
  .settings-row { display: flex; gap: 12px; margin-top: 6px; align-items: center; flex-wrap: wrap; }
  .toggle-label { display: flex; align-items: center; gap: 5px; font-size: 11px; color: var(--text3); cursor: pointer; }
  .toggle-label input { accent-color: var(--accent); }
  .typing { display: flex; align-items: center; gap: 4px; padding: 4px 0; }
  .typing span { width: 6px; height: 6px; border-radius: 50%; background: var(--text3); display: inline-block; animation: bounce 1.2s infinite; }
  .typing span:nth-child(2) { animation-delay: 0.2s; }
  .typing span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce { 0%,80%,100%{transform:translateY(0)} 40%{transform:translateY(-5px)} }
  .empty-state { text-align: center; margin: auto; display: flex; flex-direction: column; align-items: center; gap: 10px; }
  .empty-icon { font-size: 36px; }
  .empty-title { font-size: 16px; font-weight: 500; }
  .empty-sub { font-size: 13px; color: var(--text3); max-width: 340px; line-height: 1.6; }
</style>
</head>
<body>

<header>
  <div class="header-left">
    <div class="logo">&#128202;</div>
    <div>
      <div class="header-title">DB Middleware Chat</div>
      <div class="header-sub">NLP to SQL + SLM</div>
    </div>
  </div>
  <div>
    <span class="status-dot" id="status-dot"></span>
    <span class="status-text" id="status-text">Connecting...</span>
  </div>
</header>

<div class="schema-bar" id="schema-bar">
  <span id="schema-bar-icon">&#9888;</span>
  <span id="schema-bar-msg">No database connected.</span>
  <div id="schema-tables"></div>
  <button onclick="showSchemaChooser()">Change DB</button>
</div>

<div id="messages">
  <div class="empty-state" id="empty-state">
    <div class="empty-icon">&#128202;</div>
    <div class="empty-title">Ask anything about your data</div>
    <div class="empty-sub">Type a question in plain English. Connect a database first by entering a DB URL or pasting schema DDL.</div>
  </div>
</div>

<div class="input-area">
  <div class="input-row">
    <textarea id="user-input" rows="1" placeholder="Ask a question about your data..." onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
    <button class="send-btn" id="send-btn" onclick="sendMessage()">
      <svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2z"/></svg>
    </button>
  </div>
  <div class="input-hints">
    <button class="hint-btn" onclick="useHint('Show all employees')">All employees</button>
    <button class="hint-btn" onclick="useHint('Average salary by department')">Avg salary by dept</button>
    <button class="hint-btn" onclick="useHint('List all active projects')">Active projects</button>
    <button class="hint-btn" onclick="useHint('Top 5 highest paid employees')">Top 5 paid</button>
    <button class="hint-btn" onclick="useHint('Count employees per department')">Count by dept</button>
  </div>
  <div class="settings-row">
    <label class="toggle-label"><input type="checkbox" id="use-model"> Use AI model (SLM)</label>
    <label class="toggle-label"><input type="checkbox" id="execute-query" checked> Execute query</label>
    <span style="margin-left:auto;font-size:11px;color:var(--text3)" id="db-label">DB: not connected</span>
  </div>
</div>

<script>
const API = 'http://localhost:8000/api/v1';
let hasSchema = false;
let pendingQuestion = null;

function esc(s) {
  return String(s == null ? 'NULL' : s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

async function checkHealth() {
  try {
    const r = await fetch(API + '/health');
    if (r.ok) {
      setStatus(true);
    } else throw new Error();
  } catch {
    setStatus(false);
    updateSchemaBar([], false);
  }
}

function setStatus(online) {
  document.getElementById('status-dot').style.background = online ? '#639922' : '#E24B4A';
  document.getElementById('status-text').textContent = online ? 'Backend online' : 'Offline — start uvicorn';
}

function updateSchemaBar(tables, connected) {
  const bar = document.getElementById('schema-bar');
  bar.className = 'schema-bar' + (connected ? ' connected' : '');
  document.getElementById('schema-bar-icon').textContent = connected ? '✓' : '⚠';
  document.getElementById('schema-bar-msg').textContent = connected ? 'Connected:' : 'No database connected. Ask a question to set up.';
  document.getElementById('schema-tables').innerHTML = tables.map(t => `<span class="table-pill">${esc(t)}</span>`).join('');
}

function addMsg(html, isUser) {
  document.getElementById('empty-state')?.remove();
  const msgs = document.getElementById('messages');
  const d = document.createElement('div');
  d.className = 'msg' + (isUser ? ' user' : '');
  const label = isUser ? 'U' : 'DB';
  const cls = isUser ? 'user' : 'bot';
  d.innerHTML = `<div class="avatar ${cls}">${label}</div><div class="bubble">${html}</div>`;
  msgs.appendChild(d);
  msgs.scrollTop = msgs.scrollHeight;
  return d;
}

function addBotText(text) { addMsg(`<p>${esc(text)}</p>`, false); }

function showTyping() {
  const d = addMsg('<div class="typing"><span></span><span></span><span></span></div>', false);
  d.id = 'typing';
  return d;
}
function removeTyping() { document.getElementById('typing')?.remove(); }

function showSchemaChooser() {
  document.getElementById('empty-state')?.remove();
  const d = addMsg(`
    <div class="schema-prompt">
      <p>How would you like to connect your database?</p>
      <div class="choice-row">
        <button class="choice-btn" onclick="showDBUrlInput(this)">&#128202; Connect DB URL<br><small style="color:var(--text3)">sqlite:///./mydata.db or any supported SQLAlchemy URL</small></button>
        <button class="choice-btn" onclick="showDDLInput(this)">&#128196; Paste schema DDL<br><small style="color:var(--text3)">create an in-memory database</small></button>
      </div>
    </div>`, false);
  d.id = 'schema-chooser';
}

function showDBUrlInput(btn) {
  document.getElementById('schema-chooser')?.remove();
  const d = addMsg(`
    <div class="schema-prompt">
      <p>Enter your database connection URL.</p>
      <input id="db-url" class="schema-textarea" placeholder="sqlite:///./mydb.db" />
      <div class="btn-row">
        <button onclick="this.closest('.msg').remove()">Cancel</button>
        <button class="primary" onclick="submitDBUrl()">Connect</button>
      </div>
    </div>`, false);
  d.id = 'db-url-input';
}

function showDDLInput(btn) {
  document.getElementById('schema-chooser')?.remove();
  const d = addMsg(`
    <div class="schema-prompt">
      <p>Paste your CREATE TABLE statements below. This will create an in-memory database for query execution.</p>
      <textarea class="schema-textarea" id="ddl-text" placeholder="CREATE TABLE users (\n  id INTEGER PRIMARY KEY,\n  name TEXT\n);\n\nCREATE TABLE orders (\n  id INTEGER PRIMARY KEY,\n  user_id INTEGER,\n  amount REAL\n);"></textarea>
      <div class="btn-row">
        <button onclick="this.closest('.msg').remove()">Cancel</button>
        <button class="primary" onclick="submitDDL()">Use this schema</button>
      </div>
    </div>`, false);
  d.id = 'ddl-input';
}

async function submitDBUrl() {
  const database_url = document.getElementById('db-url')?.value.trim();
  if (!database_url) return;
  document.getElementById('db-url-input')?.remove();
  await connectDatabase({ database_url });
}

async function submitDDL() {
  const ddl = document.getElementById('ddl-text')?.value.trim();
  if (!ddl) return;
  document.getElementById('ddl-input')?.remove();
  await connectDatabase({ ddl });
}

async function connectDatabase(body) {
  addBotText('Connecting to database...');
  try {
    const res = await fetch(API + '/connect', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    });

    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      throw new Error(err.detail || 'Unable to connect to database.');
    }

    const data = await res.json();
    hasSchema = true;
    const tables = data.tables || [];
    updateSchemaBar(tables, true);
    document.getElementById('db-label').textContent = body.database_url
      ? `DB: ${body.database_url}`
      : `DB: custom (${tables.length} table${tables.length !== 1 ? 's' : ''})`;

    addBotText(`Connected successfully. Schema contains ${tables.length} table(s): ${tables.join(', ')}.`);
    if (pendingQuestion) {
      const q = pendingQuestion;
      pendingQuestion = null;
      doQuery(q);
    }
  } catch (err) {
    addBotText(err.message);
  }
}

function buildResultBubble(data) {
  const { generated_sql, method, confidence, result, error } = data;
  let h = `<div class="sql-label">Generated SQL</div><div class="sql-block">${esc(generated_sql)}</div>`;
  if (result) {
    const { columns, rows, row_count } = result;
    h += `<div class="result-wrap"><div class="result-header">Results <span class="row-count">${row_count} row${row_count !== 1 ? 's' : ''}</span></div>`;
    if (row_count === 0) {
      h += `<div style="padding:12px;font-size:13px;color:var(--text3);text-align:center">No results found</div>`;
    } else {
      h += `<div class="result-table-wrap"><table><thead><tr>${columns.map(c=>`<th>${esc(c)}</th>`).join('')}</tr></thead><tbody>`;
      rows.forEach(row => { h += `<tr>${columns.map(c=>`<td>${esc(row[c])}</td>`).join('')}</tr>`; });
      h += `</tbody></table></div>`;
    }
    h += `</div>`;
  }
  if (error && !result) h += `<div class="meta"><span class="badge err">Error: ${esc(error)}</span></div>`;
  h += `<div class="meta">
    <span class="badge ${method === 'slm' ? 'slm' : 'rule'}">${method === 'slm' ? 'AI model' : 'Rule-based'}</span>
    <span class="badge ${confidence}">${confidence} confidence</span>
  </div>`;
  return h;
}

async function doQuery(question) {
  const useModel = document.getElementById('use-model').checked;
  const execute = document.getElementById('execute-query').checked;
  showTyping();
  try {
    const body = { question, execute, use_model: useModel };
    const r = await fetch(API + '/query', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(body) });
    removeTyping();
    if (!r.ok) { const e = await r.json().catch(()=>({})); addBotText(`Error ${r.status}: ${e.detail || 'Something went wrong.'}`); }
    else { addMsg(buildResultBubble(await r.json()), false); }
  } catch {
    removeTyping();
    addBotText('Cannot reach the backend. Make sure uvicorn is running at localhost:8000.');
  }
}

async function sendMessage() {
  const input = document.getElementById('user-input');
  const question = input.value.trim();
  if (!question) return;
  input.value = ''; input.style.height = 'auto';
  document.getElementById('send-btn').disabled = true;
  addMsg(`<p>${esc(question)}</p>`, true);

  if (!hasSchema) {
    pendingQuestion = question;
    addBotText("I need to know your database schema first. Which database would you like to use?");
    showSchemaChooser();
    document.getElementById('send-btn').disabled = false;
    return;
  }
  await doQuery(question);
  document.getElementById('send-btn').disabled = false;
}

function handleKey(e) { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } }
function autoResize(el) { el.style.height = 'auto'; el.style.height = Math.min(el.scrollHeight, 120) + 'px'; }
function useHint(t) { document.getElementById('user-input').value = t; sendMessage(); }

checkHealth();
</script>
</body>
</html>
